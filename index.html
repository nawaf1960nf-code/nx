<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bloom" />
  <meta name="theme-color" content="#f7c8d8" />
  <meta name="description" content="Bloom — AI-powered fitness for women. Train smart. Glow stronger." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <title>Bloom — AI Fitness for Women</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Cairo:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ───────────── SPLASH ───────────── -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-mark">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal-core"></div>
      </div>
      <div class="splash-brand">Bloom</div>
      <div class="splash-tag" data-lang-en="Train smart. Glow stronger." data-lang-ar="تمرّني بذكاء. توهّجي أقوى.">Train smart. Glow stronger.</div>
    </div>
  </div>

  <!-- ───────────── AUTH ───────────── -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-bg">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
    </div>

    <div class="auth-card glass">
      <div class="auth-brand">
        <div class="mark-sm">
          <div class="petal p1"></div><div class="petal p2"></div>
          <div class="petal p3"></div><div class="petal p4"></div>
          <div class="petal-core"></div>
        </div>
        <h1 data-lang-en="Welcome to Bloom" data-lang-ar="أهلاً بكِ في Bloom">Welcome to Bloom</h1>
        <p data-lang-en="Your premium AI fitness coach — built for women." data-lang-ar="مدرّبتك الذكية الفاخرة — مصمّمة للنساء.">Your premium AI fitness coach — built for women.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" data-lang-en="Sign in" data-lang-ar="تسجيل دخول">Sign in</button>
        <button class="auth-tab" data-tab="signup" data-lang-en="Create account" data-lang-ar="حساب جديد">Create account</button>
      </div>

      <form id="login-form" class="auth-form active" autocomplete="on">
        <div class="form-row">
          <label data-lang-en="Email" data-lang-ar="البريد">Email</label>
          <input type="email" name="email" required placeholder="you@example.com" autocomplete="username" />
        </div>
        <div class="form-row">
          <label data-lang-en="Password" data-lang-ar="كلمة السر">Password</label>
          <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password" minlength="4" />
        </div>
        <button class="btn btn-primary btn-lg" type="submit" data-lang-en="Sign in" data-lang-ar="دخول">Sign in</button>
        <p class="form-error" id="login-error"></p>
      </form>

      <form id="signup-form" class="auth-form" autocomplete="on">
        <div class="form-row">
          <label data-lang-en="Your name" data-lang-ar="الاسم">Your name</label>
          <input type="text" name="name" required placeholder="Sara" minlength="2" maxlength="24" autocomplete="name" />
        </div>
        <div class="form-row">
          <label data-lang-en="Email (real or fake)" data-lang-ar="البريد (حقيقي أو وهمي)">Email</label>
          <input type="email" name="email" required placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-row">
          <label data-lang-en="Password (4+ characters)" data-lang-ar="كلمة السر (٤ أحرف على الأقل)">Password</label>
          <input type="password" name="password" required placeholder="••••••••" autocomplete="new-password" minlength="4" />
        </div>
        <button class="btn btn-primary btn-lg" type="submit" data-lang-en="Begin my journey ✨" data-lang-ar="ابدئي رحلتي ✨">Begin my journey ✨</button>
        <p class="form-error" id="signup-error"></p>
      </form>

      <p class="tiny-note" data-lang-en="Your data is saved privately on this device." data-lang-ar="بياناتك محفوظة بخصوصية على هذا الجهاز.">Your data is saved privately on this device.</p>

      <div class="auth-langs">
        <button class="auth-lang-btn active" data-lang="en">English</button>
        <button class="auth-lang-btn" data-lang="ar">العربية</button>
      </div>
    </div>
  </div>

  <!-- ───────────── ONBOARDING ───────────── -->
  <div id="onboard-screen" class="onboard-screen hidden">
    <div class="auth-bg">
      <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
    </div>
    <div class="onboard-card glass">
      <div class="onboard-progress"><div class="onboard-progress-fill" id="onboard-progress"></div></div>
      <div id="onboard-step"></div>
    </div>
  </div>

  <!-- ───────────── APP ───────────── -->
  <div id="app" class="app hidden">
    <!-- Topbar (mobile) -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="avatar avatar-sm" id="topbar-avatar">S</div>
        <div class="topbar-greet">
          <div class="topbar-hello" id="topbar-hello">Hi</div>
          <div class="topbar-name" id="topbar-name">—</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="lang-btn" title="Language">🌐</button>
        <button class="icon-btn" id="theme-btn" title="Theme">🌙</button>
      </div>
    </header>

    <main class="main">
      <section id="view-home" class="view active"></section>
      <section id="view-workouts" class="view"></section>
      <section id="view-progress" class="view"></section>
      <section id="view-coach" class="view"></section>
      <section id="view-profile" class="view"></section>
      <section id="view-session" class="view view-fullscreen"></section>
      <section id="view-library" class="view"></section>
      <section id="view-nutrition" class="view"></section>
      <section id="view-achievements" class="view"></section>
    </main>

    <!-- Bottom nav (mobile-first) -->
    <nav class="bottom-nav">
      <button class="bn-item active" data-view="home">
        <div class="bn-ico">🏠</div>
        <div class="bn-lbl" data-lang-en="Home" data-lang-ar="الرئيسية">Home</div>
      </button>
      <button class="bn-item" data-view="workouts">
        <div class="bn-ico">💪</div>
        <div class="bn-lbl" data-lang-en="Train" data-lang-ar="التمارين">Train</div>
      </button>
      <button class="bn-item" data-view="progress">
        <div class="bn-ico">📈</div>
        <div class="bn-lbl" data-lang-en="Progress" data-lang-ar="التقدّم">Progress</div>
      </button>
      <button class="bn-item" data-view="coach">
        <div class="bn-ico">✨</div>
        <div class="bn-lbl" data-lang-en="Coach" data-lang-ar="المدرّبة">Coach</div>
      </button>
      <button class="bn-item" data-view="profile">
        <div class="bn-ico">👑</div>
        <div class="bn-lbl" data-lang-en="You" data-lang-ar="حسابك">You</div>
      </button>
    </nav>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass" id="modal-card"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Rest timer overlay -->
  <div id="rest-timer" class="rest-timer hidden">
    <div class="rest-timer-inner">
      <div class="rest-label" data-lang-en="Rest" data-lang-ar="استراحة">Rest</div>
      <div class="rest-time" id="rest-time">01:00</div>
      <div class="rest-actions">
        <button class="btn btn-ghost btn-sm" id="rest-minus">−15s</button>
        <button class="btn btn-ghost btn-sm" id="rest-plus">+15s</button>
        <button class="btn btn-primary btn-sm" id="rest-skip" data-lang-en="Skip" data-lang-ar="تخطي">Skip</button>
      </div>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/confetti.js"></script>
  <script src="assets/js/ai.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/onboard.js"></script>
  <script src="assets/js/views.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
